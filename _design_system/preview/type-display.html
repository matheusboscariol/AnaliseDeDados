<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 160px 1fr; gap: 28px; align-items: baseline; padding: 14px 0; border-bottom: 1px solid #272A33; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.6; }
  .meta strong { color: #A1A4AE; display: block; font-size: 11px; font-weight: 500; text-transform: none; letter-spacing: 0; margin-bottom: 2px; }
  .display { font-size: 40px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.05; }
  .h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">03 ·</span> Display &amp; H1 — Geist Sans</div>
  <div class="row">
    <div class="meta"><strong>Display</strong>40-64px · 600<br/>tracking -0.025em</div>
    <div class="display">Da estratégia à execução.</div>
  </div>
  <div class="row">
    <div class="meta"><strong>H1</strong>32-40px · 600<br/>tracking -0.02em</div>
    <div class="h1">Uma consultoria que une estratégia, execução e tecnologia.</div>
  </div>
</div>
</body>
</html>
