<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .mini {
    border: 1px solid #272A33;
    border-radius: 8px;
    padding: 20px 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    background: #11131A;
    aspect-ratio: 1 / 1;
    text-align: center;
  }
  .mini.light { background: #F5F6F8; }
  .mini img { width: 100%; max-width: 120px; height: auto; }
  .cap { font-family: 'Geist Mono', monospace; font-size: 9px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; }
  .mini.light .cap { color: #71747E; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">01 ·</span> Logo variations</div>
  <div class="row">
    <div class="mini">
      <img src="../assets/logo-pipeline-mono-white.svg" alt="Mono white" />
      <span class="cap">Mono · white</span>
    </div>
    <div class="mini">
      <img src="../assets/logo-pipeline-symbol.svg" alt="Default symbol" />
      <span class="cap">Default · accent</span>
    </div>
    <div class="mini light">
      <img src="../assets/logo-pipeline-light.svg" alt="Light mode" />
      <span class="cap">Light mode</span>
    </div>
    <div class="mini">
      <img src="../assets/logo-favicon.svg" alt="Favicon" style="max-width:44px" />
      <span class="cap">Favicon · 16-32px</span>
    </div>
  </div>
</div>
</body>
</html>
