<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .box {
    background: #2563EB; color: white;
    border-radius: 8px; padding: 14px 22px;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 500;
    font-family: 'Geist', sans-serif;
  }
  .demo { background: #11131A; border: 1px solid #272A33; border-radius: 12px; padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lbl { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; }
  .glow { box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 24px -8px rgba(37,99,235,0.45); }
  .ring { box-shadow: 0 0 0 1px rgba(37,99,235,0.4), 0 20px 40px -16px rgba(37,99,235,0.45); }
  .card-demo {
    width: 100%; max-width: 220px;
    background: #11131A; border: 1px solid #2563EB; border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 0 1px rgba(37,99,235,0.3), 0 20px 40px -16px rgba(37,99,235,0.45);
  }
  .card-demo .ico { width: 32px; height: 32px; border-radius: 8px; background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.3); display: flex; align-items: center; justify-content: center; color: #60A5FA; margin-bottom: 12px; font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600; }
  .card-demo h4 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
  .card-demo p { margin: 0; font-size: 12px; color: #A1A4AE; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">04 ·</span> Shadow &amp; glow system</div>
  <div class="row">
    <div class="demo">
      <div class="box glow">Botão primário</div>
      <div class="lbl">--shadow-btn · accent glow 25%</div>
    </div>
    <div class="demo">
      <div class="card-demo">
        <div class="ico">M</div>
        <h4>Card · hover state</h4>
        <p>Borda passa a accent + glow externo.</p>
      </div>
      <div class="lbl">--shadow-card-hover</div>
    </div>
  </div>
</div>
</body>
</html>
