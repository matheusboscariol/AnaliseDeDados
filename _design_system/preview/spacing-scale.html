<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: center; gap: 14px; padding: 8px 0; border-bottom: 1px solid #272A33; }
  .row:last-child { border-bottom: none; }
  .tok { font-family: 'Geist Mono', monospace; font-size: 12px; color: #A1A4AE; width: 90px; }
  .px  { font-family: 'Geist Mono', monospace; font-size: 11px; color: #71747E; width: 56px; }
  .bar { height: 8px; background: #2563EB; border-radius: 2px; opacity: 0.8; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">04 ·</span> Spacing scale · 4px base</div>
  <div class="row"><div class="tok">--space-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">--space-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tok">--space-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">--space-6</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">--space-8</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">--space-12</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tok">--space-16</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="tok">--space-24</div><div class="px">96px</div><div class="bar" style="width:96px"></div></div>
</div>
</body>
</html>
