<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-card {
    text-align: left;
    padding: 20px 0 20px 20px;
    border-left: 1px solid #272A33;
  }
  .stat-card .num {
    font-family: 'Geist Mono', monospace;
    font-size: 44px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #F5F6F8 0%, #3B82F6 160%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(59,130,246,0.25);
  }
  .stat-card .lbl {
    font-size: 12px;
    color: #A1A4AE;
    margin-top: 10px;
    line-height: 1.45;
  }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">05 ·</span> Stat block · mono numbers with subtle glow</div>
  <div class="row">
    <div class="stat-card"><div class="num">12+</div><div class="lbl">anos em marketing e tecnologia</div></div>
    <div class="stat-card"><div class="num">150+</div><div class="lbl">clientes atendidos</div></div>
    <div class="stat-card"><div class="num">R$ 750k</div><div class="lbl">em receita gerada</div></div>
    <div class="stat-card"><div class="num">80k+</div><div class="lbl">seguidores no Instagram</div></div>
  </div>
</div>
</body>
</html>
