<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .footer {
    padding: 24px 28px;
    background: #0A0B0F;
    border: 1px solid #272A33;
    border-radius: 12px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .brand { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; color: #F5F6F8; }
  .brand .ac { color: #60A5FA; }
  .sub { font-size: 12px; color: #71747E; margin-top: 6px; }
  .meta { font-family: 'Geist Mono', monospace; font-size: 11px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta a { color: #A1A4AE; text-decoration: none; }
  .row { display: flex; gap: 16px; align-items: center; }
  .socials { display: flex; gap: 12px; font-size: 16px; color: #71747E; margin-top: 8px; }
  .copyright { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 18px; padding-top: 16px; border-top: 1px solid #272A33; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">05 ·</span> Footer</div>
  <div class="footer" style="flex-direction:column;align-items:stretch">
    <div class="row" style="justify-content:space-between;align-items:flex-start">
      <div>
        <div class="brand">matheus<span class="ac">.</span>boscariol</div>
        <div class="sub">Consultoria em marketing, tecnologia e IA.</div>
      </div>
      <div style="text-align:right">
        <div class="meta"><a>matheusboscariol@gmail.com</a> · <a>+55 (19) 99907-8928</a></div>
        <div class="socials" style="justify-content:flex-end">
          <span>in</span><span>·</span><span>ig</span>
        </div>
      </div>
    </div>
    <div class="copyright">© 2026 Matheus Boscariol · Todos os direitos reservados</div>
  </div>
</div>
</body>
</html>
