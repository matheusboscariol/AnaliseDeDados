<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    background: rgba(10,11,15,0.72);
    backdrop-filter: blur(12px);
    border: 1px solid #272A33;
    border-radius: 12px;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: #2563EB; box-shadow: 0 0 12px rgba(37,99,235,0.6); }
  .links { display: flex; gap: 6px; font-family: 'Geist', sans-serif; font-size: 13px; }
  .links a { padding: 6px 12px; border-radius: 6px; color: #A1A4AE; }
  .links a.active { color: #F5F6F8; background: #1A1D26; }
  .cta {
    display: inline-flex; align-items: center; gap: 6px;
    background: #2563EB; color: white;
    padding: 8px 14px; border-radius: 8px;
    font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 24px -8px rgba(37,99,235,0.4);
  }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">05 ·</span> Header / nav · sticky, blur backdrop</div>
  <div class="nav">
    <div class="brand"><span class="dot"></span>matheus<span style="color:#60A5FA">.</span>boscariol</div>
    <div class="links">
      <a class="active">Para quem</a>
      <a>Como ajudo</a>
      <a>Metodologia</a>
      <a>Sobre</a>
    </div>
    <div class="cta">Falar agora</div>
  </div>
</div>
</body>
</html>
