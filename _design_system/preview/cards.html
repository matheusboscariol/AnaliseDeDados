<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .feature-card {
    border: 1px solid #272A33;
    border-radius: 12px;
    background: #11131A;
    padding: 22px;
    position: relative;
  }
  .feature-card.hover {
    border-color: #2563EB;
    box-shadow: 0 0 0 1px rgba(37,99,235,0.3), 0 20px 40px -16px rgba(37,99,235,0.45);
  }
  .feature-card .icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #1A1D26;
    border: 1px solid #272A33;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    color: #60A5FA;
    font-family: 'Geist Mono', monospace;
    font-size: 14px; font-weight: 600;
  }
  .feature-card h4 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  .feature-card p { margin: 0; font-size: 13px; color: #A1A4AE; line-height: 1.55; }
  .feature-card .num { position: absolute; top: 16px; right: 18px; font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; }
  .lbl { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">05 ·</span> Card · default &amp; hover</div>
  <div class="row">
    <div>
      <div class="feature-card">
        <span class="num">01</span>
        <div class="icon">↗</div>
        <h4>Estratégia e direcionamento</h4>
        <p>Definição de prioridades e clareza nos próximos passos.</p>
      </div>
      <div class="lbl">default</div>
    </div>
    <div>
      <div class="feature-card hover">
        <span class="num">01</span>
        <div class="icon">↗</div>
        <h4>Estratégia e direcionamento</h4>
        <p>Definição de prioridades e clareza nos próximos passos.</p>
      </div>
      <div class="lbl">hover · accent border + glow</div>
    </div>
  </div>
</div>
</body>
</html>
