<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 160px 1fr; gap: 28px; align-items: baseline; padding: 14px 0; border-bottom: 1px solid #272A33; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.6; }
  .meta strong { color: #A1A4AE; display: block; font-size: 11px; font-weight: 500; text-transform: none; letter-spacing: 0; margin-bottom: 2px; }
  .eb {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #60A5FA;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eb .bar { width: 24px; height: 1px; background: #60A5FA; display: inline-block; }
  .stat {
    font-family: 'Geist Mono', monospace;
    font-size: 56px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #F5F6F8 0%, #3B82F6 140%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .caption { font-family: 'Geist Mono', monospace; font-size: 11px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">03 ·</span> Mono — eyebrow, stat, caption</div>
  <div class="row"><div class="meta"><strong>Eyebrow</strong>12px · 500 · mono caps</div><div class="eb"><span class="bar"></span>A solução</div></div>
  <div class="row"><div class="meta"><strong>Stat</strong>48-56px · mono · gradient</div><div class="stat">150+</div></div>
  <div class="row"><div class="meta"><strong>Caption</strong>11px · mono · muted</div><div class="caption">© 2026 Matheus Boscariol · Todos os direitos reservados</div></div>
</div>
</body>
</html>
