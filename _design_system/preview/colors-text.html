<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border: 1px solid #272A33; border-radius: 8px; overflow: hidden; background: #11131A; }
  .chip { height: 64px; border-bottom: 1px solid #272A33; }
  .info { padding: 10px 12px; }
  .tok { font-family: 'Geist Mono', monospace; font-size: 11px; color: #F5F6F8; font-weight: 500; }
  .hex { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; margin-top: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">02 ·</span> Text hierarchy &amp; borders</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#F5F6F8"></div><div class="info"><div class="tok">--text-primary</div><div class="hex">#F5F6F8</div></div></div>
    <div class="sw"><div class="chip" style="background:#A1A4AE"></div><div class="info"><div class="tok">--text-secondary</div><div class="hex">#A1A4AE</div></div></div>
    <div class="sw"><div class="chip" style="background:#71747E"></div><div class="info"><div class="tok">--text-muted</div><div class="hex">#71747E</div></div></div>
    <div class="sw"><div class="chip" style="background:#3F4350"></div><div class="info"><div class="tok">--border-default</div><div class="hex">#3F4350</div></div></div>
  </div>
</div>
</body>
</html>
