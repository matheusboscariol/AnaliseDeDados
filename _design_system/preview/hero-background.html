<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .grid {
    background:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px) 0 0 / 32px 32px,
      radial-gradient(ellipse 60% 70% at 50% 0%, rgba(37,99,235,0.18), transparent 60%),
      #0A0B0F;
    border: 1px solid #272A33;
    border-radius: 12px;
    height: 180px;
    position: relative;
    overflow: hidden;
  }
  .grid::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 70%);
    pointer-events: none;
  }
  .body { font-size: 13px; color: #A1A4AE; line-height: 1.6; }
  .body strong { color: #F5F6F8; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">06 ·</span> Hero background · radial glow + grid</div>
  <div class="grid"></div>
  <div class="body">
    <strong>Pattern:</strong> 56-px grid in rgba(255,255,255,0.04) + radial blue glow at top center, faded out via mask. Used only in hero and final CTA — never repeated as section background.
  </div>
</div>
</body>
</html>
