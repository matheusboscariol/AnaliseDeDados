<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: center; gap: 20px; padding: 14px 0; border-bottom: 1px solid #272A33; }
  .row:last-child { border-bottom: none; }
  .box { background: #11131A; border: 1px solid #3F4350; }
  .meta { font-family: 'Geist Mono', monospace; font-size: 11px; }
  .meta .tok { color: #F5F6F8; }
  .meta .px { color: #71747E; margin-left: 6px; }
  .meta .use { color: #A1A4AE; margin-left: 14px; font-size: 12px; font-family: 'Geist', sans-serif; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">04 ·</span> Radius system</div>
  <div class="row"><div class="box" style="width:48px; height:48px; border-radius:6px"></div>
    <div class="meta"><span class="tok">--radius-sm</span><span class="px">6px</span><span class="use">badges, nav pills</span></div></div>
  <div class="row"><div class="box" style="width:48px; height:48px; border-radius:8px"></div>
    <div class="meta"><span class="tok">--radius-md</span><span class="px">8px</span><span class="use">buttons, inputs</span></div></div>
  <div class="row"><div class="box" style="width:48px; height:48px; border-radius:12px"></div>
    <div class="meta"><span class="tok">--radius-lg</span><span class="px">12px</span><span class="use">cards (default)</span></div></div>
  <div class="row"><div class="box" style="width:48px; height:48px; border-radius:16px"></div>
    <div class="meta"><span class="tok">--radius-xl</span><span class="px">16px</span><span class="use">hero containers, mockups</span></div></div>
  <div class="row"><div class="box" style="width:48px; height:48px; border-radius:999px"></div>
    <div class="meta"><span class="tok">--radius-full</span><span class="px">999px</span><span class="use">pills, badges, dot indicators</span></div></div>
</div>
</body>
</html>
