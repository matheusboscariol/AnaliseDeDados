<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .stage {
    background:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px) 0 0 / 32px 32px,
      #0A0B0F;
    border: 1px solid #272A33;
    border-radius: 12px;
    padding: 32px;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Geist', sans-serif;
    font-size: 14px; font-weight: 500;
    border-radius: 8px;
    padding: 12px 22px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.16, 1, 0.3, 1);
    line-height: 1;
  }
  .btn-primary { background: #2563EB; color: white; box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 24px -8px rgba(37,99,235,0.4); }
  .btn-primary.hover { background: #3B82F6; transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 12px 32px -8px rgba(37,99,235,0.5); }
  .btn-secondary { background: transparent; color: #F5F6F8; border-color: #3F4350; }
  .btn-secondary.hover { background: #1A1D26; border-color: #71747E; }
  .btn-ghost { background: transparent; color: #A1A4AE; }
  .btn-ghost.hover { color: #F5F6F8; }
  .lbl { font-family: 'Geist Mono', monospace; font-size: 10px; color: #71747E; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 8px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow"><span class="accent">05 ·</span> Buttons · default &amp; hover states</div>
  <div class="stage">
    <div class="col"><button class="btn btn-primary">Agendar diagnóstico →</button><div class="lbl">primary · default</div></div>
    <div class="col"><button class="btn btn-primary hover">Agendar diagnóstico →</button><div class="lbl">primary · hover</div></div>
    <div class="col"><button class="btn btn-secondary">Falar pelo WhatsApp</button><div class="lbl">secondary · default</div></div>
    <div class="col"><button class="btn btn-secondary hover">Falar pelo WhatsApp</button><div class="lbl">secondary · hover</div></div>
    <div class="col"><button class="btn btn-ghost">Ver mais</button><div class="lbl">ghost · default</div></div>
    <div class="col"><button class="btn btn-ghost hover">Ver mais</button><div class="lbl">ghost · hover</div></div>
  </div>
</div>
</body>
</html>
