<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSB · Website UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* ──────────────────────────────────────────────────
     Tokens (subset of colors_and_type.css, scoped here
     so this UI kit renders standalone in any iframe)
     ────────────────────────────────────────────────── */
  :root {
    --bg-primary: #0A0B0F;
    --bg-secondary: #11131A;
    --bg-tertiary: #1A1D26;
    --border-subtle: #272A33;
    --border-default: #3F4350;
    --text-primary: #F5F6F8;
    --text-secondary: #A1A4AE;
    --text-muted: #71747E;
    --accent-primary: #1E3A8A;
    --accent-mid: #2563EB;
    --accent-hover: #3B82F6;
    --accent-bright: #60A5FA;
    --accent-subtle: rgba(37,99,235,0.10);
    --accent-glow:   rgba(37,99,235,0.25);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Geist','Inter',system-ui,sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "rlig" 1, "calt" 1;
    line-height: 1.65;
  }
  ::selection { background: var(--accent-mid); color: white; }

  /* Type utilities */
  .msb-display { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 600; letter-spacing: -0.025em; line-height: 1.05; color: var(--text-primary); margin: 0; }
  .msb-h1      { font-size: clamp(2rem, 4vw, 2.5rem); font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; color: var(--text-primary); margin: 0; }
  .msb-h2      { font-size: clamp(1.5rem,3vw,1.75rem); font-weight: 600; letter-spacing: -0.015em; line-height: 1.2; color: var(--text-primary); margin: 0; }
  .msb-h3      { font-size: 1.25rem; font-weight: 600; line-height: 1.3; color: var(--text-primary); margin: 0; }
  .msb-body-lg { font-size: 1.125rem; line-height: 1.65; color: var(--text-secondary); margin: 0; }
  .msb-body    { font-size: 1rem; line-height: 1.65; color: var(--text-secondary); margin: 0; }
  .msb-caption { font-family: 'Geist Mono', monospace; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .msb-eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 0.75rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent-bright);
  }

  /* Buttons */
  .msb-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Geist', sans-serif;
    font-size: 14px; font-weight: 500;
    border-radius: 8px;
    padding: 12px 22px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 200ms var(--ease);
    text-decoration: none;
    line-height: 1;
    white-space: nowrap;
  }
  .msb-arrow { display: inline-block; transition: transform 200ms var(--ease); }
  .msb-btn:hover .msb-arrow { transform: translateX(3px); }

  .msb-btn--primary {
    background: var(--accent-mid); color: white;
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 24px -8px var(--accent-glow);
  }
  .msb-btn--primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 12px 32px -8px var(--accent-glow);
  }
  .msb-btn--secondary {
    background: transparent; color: var(--text-primary);
    border-color: var(--border-default);
  }
  .msb-btn--secondary:hover { background: var(--bg-tertiary); border-color: var(--text-muted); }
  .msb-btn--ghost { background: transparent; color: var(--text-secondary); }
  .msb-btn--ghost:hover { color: var(--text-primary); }

  /* Card */
  .msb-card {
    border-radius: 12px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-secondary);
    padding: 24px;
    transition: all 200ms var(--ease);
  }
  @media (min-width: 768px) { .msb-card { padding: 32px; } }
  .msb-card:hover {
    border-color: rgba(37,99,235,0.5);
    box-shadow: 0 0 32px -12px rgba(37,99,235,0.45);
  }
</style>
</head>

<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components -->
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Lower.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <>
          <Header />
          <main>
            <Hero />
            <ForWhom />
            <Pillars />
            <Methodology />
            <Results />
            <FinalCTA />
          </main>
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
